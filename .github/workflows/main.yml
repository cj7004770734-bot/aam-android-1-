name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download and extract Android project
        run: |
          curl -L "https://4a791485-f203-4c8c-abfa-8e8c9848cc3c-00-2z0h44kurk4fs.riker.replit.dev/api/download/aam-android" -o aam-android.tar.gz
          tar -xzf aam-android.tar.gz --strip-components=2
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AAM-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
